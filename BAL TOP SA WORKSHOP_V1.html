<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BALENCIAGA | TOP SA WORKSHOP</title>
    <style>
        :root { --bg: #000; --fg: #fff; --brand-green: #ccff00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--fg); 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center; 
            text-transform: uppercase; overflow: hidden; 
        }
        
        canvas#confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }

        /* 统一标题区域，不随步骤改变位置 */
        .brand-header-wrap { margin-top: 10vh; text-align: center; flex-shrink: 0; }
        .brand-header { font-size: 24px; letter-spacing: 10px; font-weight: bold; }

        .container { 
            width: 85%; 
            max-width: 360px; 
            z-index: 10; 
            text-align: center;
            display: flex;
            flex-direction: column;
            flex: 1;
            padding-top: 40px; /* 紧跟标题下方 */
            min-height: 0; /* 允许内部收缩 */
        }

        .content-area { 
            width: 100%; 
            animation: fadeIn 0.4s ease;
            flex-grow: 0; /* 不强制充满 */
        }

        .tag { background: var(--fg); color: var(--bg); display: inline-block; padding: 4px 12px; font-size: 11px; font-weight: 900; margin-bottom: 20px; letter-spacing: 2px; }
        
        /* Round 2 文本描述：压缩间距，微调字号 */
        .task-text-r2 { font-size: 13px; line-height: 1.5; letter-spacing: 1px; min-height: 40px; margin-bottom: 10px; font-weight: 300; }
        .task-text-r1 { font-size: 15px; line-height: 1.6; letter-spacing: 1px; min-height: 60px; margin-bottom: 20px; font-weight: 300; }
        
        /* Round 2 像素图：大幅缩小至 50% (即 1/4 面积) */
        .pixel-display-r2 { 
            width: 32.5%; /* 原 65% 的 50% */
            aspect-ratio: 1/1; 
            margin: 0 auto 15px auto; 
            display: flex; align-items: center; justify-content: center;
            background: #111; /* 增加轻微背景区分 */
            border: 1px solid #222;
        }
        svg { width: 100%; height: 100%; image-rendering: pixelated; } /* 强化复古像素感 */
        path { fill: none; stroke: white; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }

        /* 统一按钮容器：使用绝对底部定位，物理位置固定不变 */
        .btn-wrap { 
            position: absolute;
            bottom: 120px; /* 距离底部 120px，避开页脚 */
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 360px;
            height: 55px;
            z-index: 20;
        }

        /* 统一按钮样式：白底黑字 */
        .btn-action { 
            background: var(--fg); 
            color: var(--bg); 
            border: none; 
            height: 100%;
            width: 100%;
            font-size: 14px; 
            font-weight: bold; 
            letter-spacing: 4px; 
            cursor: pointer; 
        }

        /* 任务完成后锁定状态 */
        .btn-done { 
            background: #1a1a1a !important; 
            color: #444 !important; 
            pointer-events: none; 
        }

        .footer { 
            position: absolute; 
            bottom: 35px; 
            width: 100%; 
            font-size: 10px; 
            letter-spacing: 2px; 
            opacity: 0.6; 
            text-align: center; 
            line-height: 1.8; 
            z-index: 5;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="confetti"></canvas>

    <div class="brand-header-wrap">
        <div class="brand-header">BALENCIAGA</div>
    </div>

    <div class="container">
        <div id="step-0" style="margin-top: 10vh;">
            <div style="margin-bottom: 20px; font-size: 11px; letter-spacing: 4px; opacity: 0.6;">零售精英挑战赛</div>
            <div class="btn-wrap">
                <button class="btn-action" onclick="goR1()">开始挑战</button>
            </div>
        </div>

        <div id="step-1" style="display: none; flex-direction: column;">
            <div class="content-area">
                <div class="tag">第一轮：信息查询</div>
                <div id="r1Content" class="task-text-r1"></div>
            </div>
            <div class="btn-wrap">
                <button class="btn-action" onclick="goR2()">下一关</button>
            </div>
        </div>

        <div id="step-2" style="display: none; flex-direction: column;">
            <div class="content-area" style="animation: fadeIn 0.4s ease;">
                <div class="tag" id="statusTag">第二轮：案例分析</div>
                <div class="pixel-display-r2" id="pxContainer"></div>
                <div id="r2Content" class="task-text-r2"></div>
            </div>
            <div class="btn-wrap">
                <button id="fBtn" class="btn-action" onclick="trigger()">任务完成</button>
            </div>
        </div>
    </div>

    <div class="footer">
        BALENCIAGA TOP SA WORKSHOP<br>x CHINA KTD
    </div>

    <script>
        const r1TasksList = [
            "请帮我查询香港一共有几家巴黎世家门店",
            "请帮我查询巴黎世家2026年新款信息",
            "我想了解巴黎世家的机车包有几个尺寸",
            "巴黎世家的机车包是哪一年推出的？",
            "现在巴黎世家的设计师是哪一位？"
        ];

        // 辨识度重写：CITY BAG, KNIFE HEEL, HOURGLASS, SPEED TRAINER
        const r2TasksData = [
            { text: "HOURGLASS: 沙漏包，识别其标志性的半月形硬质弧形底部轮廓。", svg: `<svg viewBox="0 0 100 100"><path d="M25 35 H75 L82 70 Q50 55 18 70 Z" fill="#0D0D0D" stroke="#333" stroke-width="1"/><path d="M40 35 Q50 15 60 35" fill="none" stroke="#222" stroke-width="2.5"/><text x="45" y="60" fill="white" font-size="12" font-family="serif" font-weight="bold">B</text></svg>` },
            { text: "KNIFE HEEL: KNIFE，识别其从鞋头延伸至极致尖端的线性轮廓。", svg: `<svg viewBox="0 0 100 100"><path d="M15 65 L75 65 L95 62 Q60 55 55 35" fill="none" stroke="#fff" stroke-width="1.2"/><line x1="75" y1="65" x2="75" y2="85" stroke="#fff" stroke-width="1.2" stroke-dasharray="3 3"/></svg>` },
            { text: "CITY BAG: 机车包，观察铆钉分布点、编织提手及垂下的长皮革拉链须。", svg: `<svg viewBox="0 0 100 100"><rect x="25" y="45" width="50" height="30" fill="#111" stroke="#333"/><path d="M30 45 Q50 25 70 45" fill="none" stroke="#333" stroke-width="2"/><path d="M28 75 V95 M72 75 V95" fill="none" stroke="#666"/><circle cx="30" cy="50" r="1.5" fill="white"/><circle cx="70" cy="50" r="1.5" fill="white"/></svg>` },
            { text: "SPEED TRAINER: 袜子鞋，识别袜套式一体化结构与人体工学中底线条。", svg: `<svg viewBox="0 0 100 100"><path d="M30 20 H45 L45 65 L80 72 V80 H30 Z" fill="#111"/><path d="M30 80 Q55 85 80 80 V88 Q55 92 30 88 Z" fill="#FFF"/><rect x="33" y="62" width="10" height="0.5" fill="#fff" opacity="0.6"/></svg>` }
        ];

        function goR1() {
            document.getElementById('step-0').style.display = 'none';
            document.getElementById('step-1').style.display = 'block';
            document.getElementById('r1Content').innerText = r1TasksList[Math.floor(Math.random() * r1TasksList.length)];
        }

        function goR2() {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            const itm = r2TasksData[Math.floor(Math.random() * r2TasksData.length)];
            document.getElementById('r2Content').innerText = itm.text;
            document.getElementById('pxContainer').innerHTML = itm.svg;
        }

        const cvs = document.getElementById('confetti');
        const ctx = cvs.getContext('2d');
        let pts = [];
        
        function trigger() {
            const b = document.getElementById('fBtn');
            b.innerText = "任务已完成";
            b.classList.add("btn-done");
            document.getElementById('statusTag').innerText = "认证高级领航员";
            document.getElementById('statusTag').style.background = "#ccff00";
            document.getElementById('statusTag').style.color = "#000";

            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            for(let i=0; i<120; i++) {
                pts.push({
                    x: cvs.width / 2, y: cvs.height / 2,
                    vx: (Math.random() - 0.5) * 16, vy: (Math.random() - 0.5) * 22 - 8,
                    sz: Math.random() * 8 + 4,
                    c: ["#ffffff", "#ccff00", "#444444"][Math.floor(Math.random()*3)],
                    a: Math.random() * 360
                });
            }
            loop();
        }

        function loop() {
            ctx.clearRect(0,0,cvs.width, cvs.height);
            pts.forEach((p, i) => {
                p.vy += 0.5; p.x += p.vx; p.y += p.vy; p.a += 10;
                ctx.save();
                ctx.translate(p.x, p.y); ctx.rotate(p.a * Math.PI / 180);
                ctx.fillStyle = p.c; ctx.fillRect(-p.sz/2, -p.sz/2, p.sz, p.sz);
                ctx.restore();
                if(p.y > cvs.height) pts.splice(i, 1);
            });
            if(pts.length > 0) requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
